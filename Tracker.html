
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Expense Tracker</title>
  <link rel="stylesheet" href="./Tracker.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300..700&family=Fira+Sans:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
  <div class="header">
    <p class="m-0">Expense<br>Tracker <img src="./Images/spending.png" alt="" height="40" width="40"></p>
  </div>

  <div class="input-form">

    <div class="form-floating inputs mb-3">
      <input type="date" class="form-control dateInput" id="dateInput" placeholder="Date">
      <label for="dateInput">Date</label>
    </div>

    <div class="form-floating inputs mb-3">
      <input type="number" class="form-control amountInput" id="amountInput" placeholder="Amount">
      <label for="amountInput">Amount</label>
    </div>

    <select class="form-select inputs transactionType mb-3">
      <option selected>Transaction Type</option>
      <option value="income">Income</option>
      <option value="expense">Expense</option>
    </select>

    <button class="btn" id="add-button" onclick="addRow()">+</button>
  </div>

  <div class="cards mt-4">
    <div class="card" style="width: 18rem;">
      <div class="card-body">
        <h5 class="card-title m-0">Total Income
          <img src="./Images/incomes.png" alt="" width="40px"  height="40">
        </h5>
        <h1 class="m-0">
          <img src="./Images/ruppe.png" alt=""  width="40px"  height="40">
          <span id="totalIncome">0</span></h1>
      </div>
    </div>

    <div class="card" style="width: 18rem;">
      <div class="card-body">
        <h5 class="card-title m-0">Total Expense
          <img src="./Images/wallet.png" alt="" width="40px"  height="40">
        </h5>
        <h1 class="m-0">
        <img src="./Images/ruppe.png" alt=""  width="40px"  height="40">
          <span id="expense">0</span></h1>
      </div>
    </div>

    <div class="card" style="width: 18rem;">
      <div class="card-body">
        <h5 class="card-title m-0">Balance
          <img src="./Images/ruppe.png" alt="" width="40px"  height="40">
        </h5>
        <h1 class="m-0">
        <img src="./Images/ruppe.png" alt=""  width="40px"  height="40">
          <span id="balance">0</span></h1>
      </div>
    </div>
  </div>

  <table class="transaction-table mt-3" id="table">
    <tr id="header-row">
      <th>Amount</th>
      <th>Transaction Type</th>
      <th>Transaction Date</th>
      <th>Action</th>
    </tr>
  </table>

  <script>
    
    // NOTE -->  date,income,expense,balance,transcationdata,action,transcationtype,Row etc ---> PARENT
   //  // NOTE --> 4555,income,7/02/2026data,deletesymbol,2ndrow          ---> appendChild     -->Children

     let table = document.getElementById('table')
    // particular row remove delete  ---> D1
    function deleteRow(row){ // row receive it.
       console.log(row);
       row.remove();  
     }

     function addRow(){

      let date = document.getElementsByClassName('dateInput')[0].value
      let amount = document.getElementsByClassName('amountInput')[0].value // 0 is first element/valve 
      let transactionType = document.getElementsByClassName('transactionType')[0].value
      //console.log(date,amount,transactionType);
      
      // create row 
      let row = document.createElement('tr') 
     // create amount
     let amountCell = document.createElement('td') 
      amountCell.innerText = amount;
       // create transaction type
       let transactionCell = document.createElement('td')
       transactionCell.innerText = transactionType;
      // create date
       let dateCell = document.createElement('td')
       dateCell.innerText = date;

   //    // Action create
       let binCell =  document.createElement('td') 
       let deleteButton = document.createElement('button') 
      // delete image create
      let binImage = document.createElement('img')
      binImage.src='Images/delete.png'
       binImage.style.width ='25px'
       binImage.style.height ='25px'
       deleteButton.appendChild(binImage)
      deleteButton.classList.add('delete-button')
       // delete row   ---> D2child
       deleteButton.onclick =()=> deleteRow(row)
       binCell.appendChild(deleteButton)

      
      // 1.table ki child is row.
      // 2.row is a parent 3.appendchild is a child means [amount,date,transcationtype]-->td.
      row.appendChild(amountCell)
       row.appendChild(transactionCell)
       row.appendChild(dateCell)
       row.appendChild(binCell)

       table.appendChild(row)


   //    // TotalIncome, Expense , Balance 
       let totalIncome = document.getElementById('totalIncome').innerText // innertext ante 0 valve vasthundhi.
       let totalExpense = document.getElementById('expense').innerText
       let balance = document.getElementById('balance').innerText

      if(transactionType == 'income'){
        if(totalIncome == '0') { // f
            document.getElementById('totalIncome').innerText = amount // amount innertext ki aasigned.
         }
         else
         {     // parseint convert into numbers/integers.
             document.getElementById('totalIncome').innerText = parseInt(totalIncome)+parseInt(amount)
         }
        //  
         if(balance== '0')
         {
           document.getElementById('balance').innerText = amount
         }
         else
         {
          document.getElementById('balance').innerText = parseInt(balance)+parseInt(amount)
         }
      
         
      } //
        else if(transactionType== 'expense'){
           if(totalExpense == '0'){
             document.getElementById('expense').innerText = amount
            }
            else
               {               // parseint convert into numbers/integers.
               document.getElementById('expense').innerText = parseInt(totalExpense)+parseInt(amount)
               }
              //  
            if(balance== '0')
            {
              document.getElementById('balance').innerText = amount
             }
            else
            {
             document.getElementById('balance').innerText = parseInt(balance)-parseInt(amount)
            }
          }
       console.log(totalIncome,totalExpense,balance);

        document.getElementsByClassName('dateInput')[0].value = ''
        document.getElementsByClassName('amountInput')[0].value = ''
     }

</script>

 <script src="script.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
